<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fromulario Lumetech</title>
    <link rel="stylesheet" href="./estilo/sytle.css">
    <link rel="icon" href="imagens/files/favicon.ico" sizes="any">
    <link rel="icon" href="imagens/files/favicon-32x32.png" type="image/png">
    <link rel="apple-touch-icon" href="imagens/files/apple-touch-icon.png">
</head>
<body>
    <section id="formulario-pedido" class="formulario-pedido">
    <div class="form-container">
        <h2>Preencha onde quer receber o mouse</h2>
        <p>Informe o local de entrega, número de chamadas e quantidade desejada.</p>
        <form id="pedidoForm">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

            <label for="localEntrega">Onde quer receber o mouse?</label>
            <input type="text" id="localEntrega" name="localEntrega" placeholder="Endereço de entrega" required>

            <label for="numChamadas">Número de chamadas</label>
            <input type="number" id="numChamadas" name="numChamadas" placeholder="Quantidade de chamadas" min="1" required>

            <label for="quantidade">Quantidade a receber</label>
            <input type="number" id="quantidade" name="quantidade" placeholder="Quantidade do produto" min="1" required>

            <div class="form-actions">
                <button type="submit" class="submit-button">Enviar pedido</button>
                <button type="button" class="cancel-button">Cancelar</button>
            </div>
        </form>
        <p class="form-success hidden" id="formSuccess">Obrigado! Seu pedido foi enviado com sucesso. Entraremos em contacto em breve.</p>
    </div>
</section>
<script src="./animacoes/formulario.js"></script>
</body>
</html>
